<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 540px; height: 540px; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .card {
    width: 1080px; height: 1080px;
    background: #f5f5f7;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 50px;
    text-align: center;
    transform: scale(0.5); transform-origin: top left;
    border: 3px solid #d0d0d0;
    border-radius: 32px;
  }
  .logo { width: 160px; height: 160px; margin-bottom: 32px; }
  .logo img { width: 100%; height: 100%; object-fit: contain; }
  h1 { font-size: 96px; font-weight: 800; color: #1a1a1a; line-height: 1.1; margin-bottom: 16px; }
  h1 span { color: #004cb9; }
  .divider { width: 70px; height: 5px; background: #BF0A30; border-radius: 2px; margin-bottom: 24px; }
  .sub { font-size: 40px; color: #666; line-height: 1.45; margin-bottom: 44px; }
  .stats { display: flex; gap: 28px; margin-bottom: 44px; }
  .stat {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 18px;
    padding: 40px 64px;
    text-align: center;
  }
  .stat .num { font-size: 84px; font-weight: 800; color: #004cb9; }
  .stat .label { font-size: 26px; color: #888; margin-top: 8px; }
  .url { font-size: 36px; font-weight: 600; color: #004cb9; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><img src="../public/logo-marketplace.png" alt=""></div>
  <h1>Shop <span>Worker-Owned</span></h1>
  <div class="divider"></div>
  <p class="sub">Search for products from worker-owned<br>cooperative stores: coffee, shoes,<br>books, hot sauce, and more</p>
  <div class="stats">
    <div class="stat">
      <div class="num">6,500+</div>
      <div class="label">Products</div>
    </div>
    <div class="stat">
      <div class="num">60+</div>
      <div class="label">Co-op Stores</div>
    </div>
  </div>
  <div class="url">workerowned.info</div>
</div>
</body>
</html>
